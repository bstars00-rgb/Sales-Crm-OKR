name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true # 코드베이스 정리 진행 중, 추후 strict로 전환

      - name: Type check
        run: npx tsc -b --noEmit
        # tsc는 strict — 타입 오류 시 빌드 차단

      - name: Unit tests (Vitest)
        run: npm test

      - name: Build
        run: npm run build
